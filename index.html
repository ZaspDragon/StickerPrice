<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sticker Price / Line Check</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
  <main class="app">
    <section class="card">
      <h1>Upload PO / SPO / SXFR / XFR File</h1>

      <p>
        Upload CSV, XLS, or XLSX. The app will detect document type, document number,
        item, qty, description, and location.
      </p>

      <label>Default Upload Document Type</label>
      <select id="defaultDocType">
        <option value="PO">PO</option>
        <option value="SPO" selected>SPO</option>
        <option value="SXFR">SXFR</option>
        <option value="XFR">XFR</option>
      </select>

      <input id="fileInput" type="file" accept=".csv,.xls,.xlsx" />

      <div class="actions">
        <button id="previewBtn">Preview File</button>
        <button id="importBtn">Import Lines</button>
        <button id="clearBtn" class="secondary">Clear</button>
      </div>

      <p id="status">0 PO line(s) ready to import.</p>

      <table>
        <thead>
          <tr>
            <th>Type</th>
            <th>Doc #</th>
            <th>Item</th>
            <th>Qty</th>
            <th>Description</th>
            <th>Location</th>
          </tr>
        </thead>
        <tbody id="previewBody"></tbody>
      </table>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
